#
# Triggered when a tag matching v* is pushed (e.g. v1.0.0).
# Builds Velopack installers + update feeds for Windows x64 AND arm64 and attaches
# all assets to the GitHub Release so the in-app auto-updater can find them.
#
# Each architecture is a separate Velopack "channel":
#   win-x64  → PigeonPost-win-x64-Setup.exe  + releases.win-x64.json
#   win-arm64→ PigeonPost-win-arm64-Setup.exe + releases.win-arm64.json
#
# The installed app knows its own channel (stamped by vpk at install time) so
# UpdateManager.CheckForUpdatesAsync() automatically reads the right feed file.
# Cross-compilation of arm64 works fine on the x64 windows-latest runner.
#
# How to release:
#   git tag v1.1.0 -m "Release 1.1.0"
#   git push origin v1.1.0

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & release (${{ matrix.channel }})
    runs-on: windows-latest
    permissions:
      contents: write   # required to create/update the GitHub Release and upload assets

    strategy:
      matrix:
        include:
          - rid: win-x64
            channel: win-x64
          - rid: win-arm64
            channel: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: dotnet restore PigeonPost.csproj

      # Extract the semver from the tag (strips the leading 'v').
      # e.g.  refs/tags/v1.2.3       →  PACK_VERSION=1.2.3,        FILE_VERSION=1.2.3.0
      #       refs/tags/v1.5.0-beta.1 →  PACK_VERSION=1.5.0-beta.1, FILE_VERSION=1.5.0.0
      # FileVersion / AssemblyVersion are Windows PE properties and must be purely
      # numeric (major.minor.build.revision).  We strip any prerelease suffix.
      - name: Parse version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"           # e.g. v1.5.0-beta.1
          $ver = $tag.TrimStart('v')                 # e.g. 1.5.0-beta.1
          $numericVer = ($ver -split '-')[0]         # e.g. 1.5.0
          echo "PACK_VERSION=$ver" >> $env:GITHUB_ENV
          echo "FILE_VERSION=$numericVer.0" >> $env:GITHUB_ENV

      # Publish a self-contained folder (NOT single-file).
      # Velopack's vpk tool needs all the DLLs/assets in a directory to pack them.
      # /p:Version overrides the csproj value so the assembly version always matches
      # the git tag — this is what the in-app footer reads at runtime.
      - name: Publish self-contained folder (${{ matrix.rid }})
        shell: pwsh
        run: |
          dotnet publish PigeonPost.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            /p:WindowsAppSdkSelfContained=true `
            /p:PublishSingleFile=false `
            /p:EnableMsixTooling=true `
            /p:Version=$env:PACK_VERSION `
            /p:FileVersion=$env:FILE_VERSION `
            /p:AssemblyVersion=$env:FILE_VERSION `
            -o publish-${{ matrix.rid }}

      # Install the Velopack CLI tool (vpk) globally.
      - name: Install vpk
        run: dotnet tool install -g vpk

      # Pack the published output into a Velopack release for this channel.
      # Creates (in releases-{channel}/):
      #   PigeonPost-{channel}-Setup.exe   — first-time installer
      #   PigeonPost-{channel}-full.nupkg  — full update package
      #   releases.{channel}.json          — update feed read by UpdateManager
      - name: Pack with vpk (${{ matrix.channel }})
        shell: pwsh
        run: |
          vpk pack `
            --packId   PigeonPost `
            --packVersion $env:PACK_VERSION `
            --packDir  publish-${{ matrix.rid }} `
            --mainExe  PigeonPost.exe `
            --channel  ${{ matrix.channel }} `
            --outputDir releases-${{ matrix.channel }}

      # Build an MSIX package from the already-published output.
      # Assets (logos) are generated from the project ICO via System.Drawing.
      # The AppxManifest.xml is derived from Package.appxmanifest with the
      # correct version and processor architecture injected.
      # The package is signed with a self-signed certificate (CN=PigeonPost).
      # For a trusted / Store-ready cert: add MSIX_CERT_PFX_BASE64 and
      # MSIX_CERT_PASSWORD as repository secrets; the step will prefer them.
      - name: Build MSIX package (${{ matrix.channel }})
        shell: pwsh
        env:
          MSIX_CERT_PFX_BASE64: ${{ secrets.MSIX_CERT_PFX_BASE64 }}
          MSIX_CERT_PASSWORD:    ${{ secrets.MSIX_CERT_PASSWORD }}
        run: |
          $rid      = "${{ matrix.rid }}"
          $channel  = "${{ matrix.channel }}"
          $arch     = $rid -replace "win-", ""          # x64 | arm64
          $pubDir   = "publish-$rid"
          $relDir   = "releases-$channel"

          # ── 1. Generate MSIX logo assets from PigeonPost.ico ──────────────
          Add-Type -AssemblyName System.Drawing
          $ico = New-Object System.Drawing.Icon("Assets\PigeonPost.ico")
          $src = $ico.ToBitmap()

          function Save-Png($bmp, $path, $w, $h) {
            $dst = New-Object System.Drawing.Bitmap($w, $h)
            $g   = [System.Drawing.Graphics]::FromImage($dst)
            $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
            $g.SmoothingMode     = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
            $g.DrawImage($bmp, 0, 0, $w, $h)
            $g.Dispose()
            $dst.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
            $dst.Dispose()
          }

          $assetDir = "$pubDir\Assets"
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

          Save-Png $src "$assetDir\Square44x44Logo.png"   44  44
          Save-Png $src "$assetDir\Square150x150Logo.png" 150 150
          Save-Png $src "$assetDir\StoreLogo.png"          50  50
          Save-Png $src "$assetDir\SplashScreen.png"      620 300

          # Wide tile: use banner_cropped.png if it exists, else scale the icon
          if (Test-Path "Assets\banner_cropped.png") {
            $banner = [System.Drawing.Image]::FromFile((Resolve-Path "Assets\banner_cropped.png"))
            Save-Png $banner "$assetDir\Wide310x150Logo.png" 310 150
            $banner.Dispose()
          } else {
            Save-Png $src "$assetDir\Wide310x150Logo.png" 310 150
          }
          $src.Dispose(); $ico.Dispose()

          # ── 2. Inject version & architecture into the manifest ────────────
          $manifest = Get-Content Package.appxmanifest -Raw
          $manifest  = $manifest -replace 'PLACEHOLDER_VERSION', $env:FILE_VERSION
          $manifest  = $manifest -replace 'PLACEHOLDER_ARCH',    $arch
          $manifest | Set-Content "$pubDir\AppxManifest.xml" -Encoding UTF8

          # ── 3. Locate makeappx.exe and signtool.exe from Windows SDK ──────
          $sdkBin   = "C:\Program Files (x86)\Windows Kits\10\bin"
          $makeappx = Get-ChildItem $sdkBin -Filter makeappx.exe -Recurse |
                        Where-Object { $_.FullName -match "\\x64\\" } |
                        Sort-Object FullName -Descending |
                        Select-Object -First 1 -ExpandProperty FullName
          $signtool = Get-ChildItem $sdkBin -Filter signtool.exe -Recurse |
                        Where-Object { $_.FullName -match "\\x64\\" } |
                        Sort-Object FullName -Descending |
                        Select-Object -First 1 -ExpandProperty FullName
          Write-Host "makeappx: $makeappx"
          Write-Host "signtool: $signtool"

          # ── 4. Pack MSIX ──────────────────────────────────────────────────
          $msixName = "PigeonPost-$channel.msix"
          & $makeappx pack /d $pubDir /p $msixName /nv /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx failed with exit code $LASTEXITCODE" }

          # ── 5. Sign MSIX ──────────────────────────────────────────────────
          if ($env:MSIX_CERT_PFX_BASE64) {
            # Use the repository secret (real code-signing cert)
            $pfxBytes = [Convert]::FromBase64String($env:MSIX_CERT_PFX_BASE64)
            [IO.File]::WriteAllBytes("signing.pfx", $pfxBytes)
            $certPwd = $env:MSIX_CERT_PASSWORD
          } else {
            # Generate a self-signed certificate for CI / sideloading
            $certPwd = "PigeonPost-$(Get-Random)"
            $cert = New-SelfSignedCertificate -Type Custom `
              -Subject "CN=PigeonPost" `
              -KeyUsage DigitalSignature `
              -FriendlyName "PigeonPost" `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
            $pwdSec = ConvertTo-SecureString -String $certPwd -Force -AsPlainText
            Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
              -FilePath "signing.pfx" -Password $pwdSec | Out-Null
          }

          & $signtool sign /fd SHA256 /f "signing.pfx" /p $certPwd $msixName
          if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE" }

          # ── 6. Move MSIX alongside Velopack artifacts for upload ──────────
          Move-Item $msixName "$relDir\$msixName"

          # Clean up certificate material
          Remove-Item "signing.pfx" -Force -ErrorAction SilentlyContinue
          Get-ChildItem "Cert:\CurrentUser\My" |
            Where-Object { $_.Subject -eq "CN=PigeonPost" } |
            Remove-Item -ErrorAction SilentlyContinue

      # Attach every file for this channel to the GitHub Release.
      # Running from parallel matrix jobs: softprops/action-gh-release handles
      # uploading from multiple jobs to the same release correctly.
      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: releases-${{ matrix.channel }}/*
