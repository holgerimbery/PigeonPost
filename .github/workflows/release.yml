#
# Triggered when a tag matching v* is pushed (e.g. v1.0.0).
# Builds Velopack installers + update feeds for Windows x64 AND arm64, signs them
# with Azure Artifact Signing (when configured), and attaches all assets to the
# GitHub Release so the in-app auto-updater can find them.
#
# Each architecture is a separate Velopack "channel":
#   win-x64  → PigeonPost-win-x64-Setup.exe  + releases.win-x64.json
#   win-arm64→ PigeonPost-win-arm64-Setup.exe + releases.win-arm64.json
#
# The installed app knows its own channel (stamped by vpk at install time) so
# UpdateManager.CheckForUpdatesAsync() automatically reads the right feed file.
# Cross-compilation of arm64 works fine on the x64 windows-latest runner.
#
# ── Azure Artifact Signing (optional) ────────────────────────────────────────
# Signing eliminates Windows SmartScreen and browser download warnings.
# When the GitHub variable AZURE_SIGNING_ACCOUNT is set, the workflow:
#   1. Signs all EXEs in the publish folder (inner binaries) before packing.
#   2. Signs the Velopack Setup installer after packing.
#
# One-time Azure setup — see wiki/Azure-Artifact-Signing-Setup.md for details:
#   • Create an Artifact Signing account + Public Trust certificate profile.
#   • Create a Microsoft Entra App Registration with a federated credential
#     scoped to:  repo:holgerimbery/PigeonPost:ref:refs/tags/*
#   • Assign the "Artifact Signing Certificate Profile Signer" role to the app.
#
# Required GitHub Secrets  (Settings → Secrets and variables → Actions):
#   AZURE_CLIENT_ID       — Entra App Registration client (application) ID
#   AZURE_TENANT_ID       — Entra / Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription ID
#
# Required GitHub Variables (Settings → Secrets and variables → Actions):
#   AZURE_SIGNING_ENDPOINT — e.g. https://eus.codesigning.azure.net/
#   AZURE_SIGNING_ACCOUNT  — Artifact Signing account name
#   AZURE_SIGNING_PROFILE  — Certificate profile name
#
# If none of the above are configured the build still succeeds; signing is skipped.
# ─────────────────────────────────────────────────────────────────────────────
#
# How to release:
#   git tag v1.1.0 -m "Release 1.1.0"
#   git push origin v1.1.0

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & release (${{ matrix.channel }})
    runs-on: windows-latest
    permissions:
      contents: write   # required to create/update the GitHub Release and upload assets
      id-token: write   # required for OIDC authentication with Azure Artifact Signing

    env:
      # Signing is enabled when the Azure signing account variable is configured.
      SIGNING_ENABLED: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}

    strategy:
      matrix:
        include:
          - rid: win-x64
            channel: win-x64
          - rid: win-arm64
            channel: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: dotnet restore PigeonPost.csproj

      # Extract the semver from the tag (strips the leading 'v').
      # e.g.  refs/tags/v1.2.3       →  PACK_VERSION=1.2.3,        FILE_VERSION=1.2.3.0
      #       refs/tags/v1.5.0-beta.1 →  PACK_VERSION=1.5.0-beta.1, FILE_VERSION=1.5.0.0
      # FileVersion / AssemblyVersion are Windows PE properties and must be purely
      # numeric (major.minor.build.revision).  We strip any prerelease suffix.
      - name: Parse version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"           # e.g. v1.5.0-beta.1
          $ver = $tag.TrimStart('v')                 # e.g. 1.5.0-beta.1
          $numericVer = ($ver -split '-')[0]         # e.g. 1.5.0
          echo "PACK_VERSION=$ver" >> $env:GITHUB_ENV
          echo "FILE_VERSION=$numericVer.0" >> $env:GITHUB_ENV

      # Publish a self-contained folder (NOT single-file).
      # Velopack's vpk tool needs all the DLLs/assets in a directory to pack them.
      # /p:Version overrides the csproj value so the assembly version always matches
      # the git tag — this is what the in-app footer reads at runtime.
      - name: Publish self-contained folder (${{ matrix.rid }})
        shell: pwsh
        run: |
          dotnet publish PigeonPost.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            /p:WindowsAppSdkSelfContained=true `
            /p:PublishSingleFile=false `
            /p:EnableMsixTooling=true `
            /p:Version=$env:PACK_VERSION `
            /p:FileVersion=$env:FILE_VERSION `
            /p:AssemblyVersion=$env:FILE_VERSION `
            -o publish-${{ matrix.rid }}

      # Authenticate with Azure using OIDC (no long-lived secrets).
      # Skipped when signing is not configured.
      - name: Azure login
        if: env.SIGNING_ENABLED == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Sign all EXEs in the publish folder before Velopack packs them.
      # This ensures both the main binary and any Velopack stubs are signed,
      # so the installed application is fully trusted by SmartScreen.
      - name: Sign published binaries (${{ matrix.rid }})
        if: env.SIGNING_ENABLED == 'true'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_SIGNING_PROFILE }}
          files-folder: publish-${{ matrix.rid }}
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      # Install the Velopack CLI tool (vpk) globally.
      - name: Install vpk
        run: dotnet tool install -g vpk

      # Pack the published output into a Velopack release for this channel.
      # Creates (in releases-{channel}/):
      #   PigeonPost-{channel}-Setup.exe   — first-time installer
      #   PigeonPost-{channel}-full.nupkg  — full update package
      #   releases.{channel}.json          — update feed read by UpdateManager
      - name: Pack with vpk (${{ matrix.channel }})
        shell: pwsh
        run: |
          vpk pack `
            --packId   PigeonPost `
            --packVersion $env:PACK_VERSION `
            --packDir  publish-${{ matrix.rid }} `
            --mainExe  PigeonPost.exe `
            --channel  ${{ matrix.channel }} `
            --outputDir releases-${{ matrix.channel }}

      # Sign the Velopack setup installer so browsers and SmartScreen trust the download.
      # This is the file users download directly from the GitHub Release page.
      - name: Sign installer (${{ matrix.channel }})
        if: env.SIGNING_ENABLED == 'true'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_SIGNING_PROFILE }}
          files-folder: releases-${{ matrix.channel }}
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      # Attach every file for this channel to the GitHub Release.
      # Running from parallel matrix jobs: softprops/action-gh-release handles
      # uploading from multiple jobs to the same release correctly.
      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: releases-${{ matrix.channel }}/*
