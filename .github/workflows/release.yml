#
# Triggered when a tag matching v* is pushed (e.g. v1.0.0).
# Builds a self-contained single-file EXE for Windows x64 and attaches it
# to the GitHub Release that is automatically created from the tag.
#
# How to release:
#   git tag v1.0.0 -m "Release 1.0.0"
#   git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & publish
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub Release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: dotnet restore PigeonPost.csproj

      # Publish a trimmed, self-contained, single-file EXE.
      # The resulting PigeonPost.exe runs on any Windows 10/11 x64 machine
      # without needing .NET or the Windows App SDK pre-installed.
      - name: Publish standalone EXE
        run: |
          dotnet publish PigeonPost.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:WindowsAppSdkSelfContained=true `
            /p:PublishSingleFile=true `
            /p:EnableMsixTooling=true `
            /p:PublishReadyToRun=false

      # Locate the published EXE and copy it to the workspace root so the
      # upload step has a stable, version-stamped filename to reference.
      - name: Stage artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter PigeonPost.exe `
                   -Path bin/Release | Where-Object { $_.DirectoryName -match 'publish' } |
                   Select-Object -First 1
          $tag  = "${{ github.ref_name }}"
          $dest = "PigeonPost-$tag-win-x64.exe"
          Copy-Item $exe.FullName $dest
          echo "ASSET=$dest" >> $env:GITHUB_ENV

      # Create the GitHub Release (from the tag) and attach the EXE.
      # release_notes are auto-generated from commits since the previous tag.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ASSET }}
